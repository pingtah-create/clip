<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clip</title>
<style>
  :root {
    --bg: #0a0a0b;
    --panel: #131316;
    --panel-2: #1c1c21;
    --border: #2a2a31;
    --text: #ececf1;
    --muted: #8b8b96;
    --accent: #f0ff00;
    --accent-dim: #c5cf00;
    --danger: #ff5c6c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; }
  h1 { font-size: 28px; margin: 0; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .badge { font-size: 12px; color: var(--muted); }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
  .card + .card { margin-top: 18px; }

  form .row { display: grid; gap: 14px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=file] {
    width: 100%; padding: 12px 14px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font: inherit; outline: none;
  }
  input:focus { border-color: var(--accent-dim); }
  .grid-2 { display: grid; grid-template-columns: 1fr 140px; gap: 14px; }
  button {
    padding: 12px 18px; background: var(--accent); color: #111; border: 0; border-radius: 10px;
    font-weight: 700; cursor: pointer; font: inherit;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); font-weight: 500; }

  .or { text-align: center; color: var(--muted); font-size: 12px; padding: 4px 0; }

  .presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .presets button {
    padding: 12px 8px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; font-weight: 500; font-size: 13px; line-height: 1.3;
  }
  .presets button.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 700; }
  .presets button small { display: block; font-weight: 400; font-size: 11px; opacity: 0.75; margin-top: 2px; }

  .status { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .bar { flex: 1; height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }
  .bar > div { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .status-text { font-size: 13px; color: var(--muted); min-width: 280px; text-align: right; }

  .clips { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; margin-top: 22px; }
  .clip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .clip video { width: 100%; aspect-ratio: 9/16; background: #000; object-fit: cover; }
  .clip .meta { padding: 12px 14px; }
  .clip .title { font-size: 14px; font-weight: 600; line-height: 1.3; min-height: 36px; }
  .clip .hook { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 32px; }
  .clip .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .score { font-size: 11px; color: var(--accent); font-weight: 700; }
  .duration { font-size: 11px; color: var(--muted); }
  .clip .dl { display: block; text-align: center; padding: 10px; background: #000; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 13px; border-top: 1px solid var(--border); }
  .clip .actions { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
  .clip .actions > * { padding: 10px; text-align: center; background: #000; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 13px; border: 0; cursor: pointer; font-family: inherit; }
  .clip .actions > * + * { border-left: 1px solid var(--border); }
  .clip .actions button { background: #000; }
  .clip .actions button:hover:not(:disabled) { background: #1a1a1a; }
  .clip .actions button.uploaded { color: #4cd964; }
  .clip .actions button.failed { color: var(--danger); }
  .clip .pending { padding: 40px 14px; text-align: center; color: var(--muted); font-size: 13px; }

  .error { color: var(--danger); font-size: 13px; margin-top: 12px; }
  .warn { color: var(--accent); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Clip<span>.</span></h1>
    <div class="badge" id="health"></div>
  </header>

  <div class="card">
    <form id="form">
      <div class="row">
        <div>
          <label for="url">YouTube or video URL</label>
          <input type="text" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="or">— or upload a file —</div>
        <div>
          <label for="file">Video file (.mp4, .mov, .mkv)</label>
          <input type="file" id="file" name="file" accept="video/*" />
        </div>
        <div>
          <label>Clip length</label>
          <div class="presets" id="presets">
            <button type="button" data-preset="short">Short<small>15–30s • TikTok</small></button>
            <button type="button" data-preset="standard" class="active">Standard<small>30–60s • Shorts</small></button>
            <button type="button" data-preset="long">Long<small>60–90s • Reels</small></button>
          </div>
          <input type="hidden" id="duration_preset" name="duration_preset" value="standard" />
        </div>
        <div class="grid-2">
          <div>
            <label for="n_clips">How many clips?</label>
            <input type="number" id="n_clips" name="n_clips" value="5" min="1" max="10" />
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button type="submit" id="go">Make clips</button>
          </div>
        </div>
      </div>
      <div class="error" id="err" hidden></div>
    </form>
  </div>

  <div id="jobView" hidden></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const fmtDur = (s) => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

async function health() {
  try {
    const r = await fetch('/api/health'); const j = await r.json();
    $('#health').textContent = j.has_anthropic_key ? 'ANTHROPIC_API_KEY ✓' : 'ANTHROPIC_API_KEY missing — edit .env';
  } catch { $('#health').textContent = ''; }
}
health();

document.querySelectorAll('#presets button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#presets button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    $('#duration_preset').value = b.dataset.preset;
  });
});

$('#form').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('#err').hidden = true;
  $('#go').disabled = true;

  const fd = new FormData();
  const url = $('#url').value.trim();
  const file = $('#file').files[0];
  if (!url && !file) { showErr('Paste a URL or pick a file'); return; }
  if (url) fd.append('url', url);
  if (file) fd.append('file', file);
  fd.append('n_clips', $('#n_clips').value);
  fd.append('duration_preset', $('#duration_preset').value);

  try {
    const r = await fetch('/api/process', { method: 'POST', body: fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const { id } = await r.json();
    track(id);
  } catch (e) {
    showErr(e.message);
  } finally {
    $('#go').disabled = false;
  }
});

function showErr(msg) {
  $('#err').textContent = msg;
  $('#err').hidden = false;
  $('#go').disabled = false;
}

let pollTimer = null;
function track(id) {
  $('#jobView').hidden = false;
  $('#jobView').innerHTML = `
    <div class="card" id="progressCard">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:600;">Processing</div>
        <div class="badge">Job ${id}</div>
      </div>
      <div class="status">
        <div class="bar"><div id="barInner" style="width: 0%"></div></div>
        <div class="status-text" id="statusText">Starting…</div>
      </div>
      <div class="warn" id="warn"></div>
    </div>
    <div class="card" id="clipsCard" hidden>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="font-weight:600;">Clips</div>
        <button id="uploadAll" class="ghost" style="display:none; padding:8px 14px; font-size:13px;">↑ Upload all to YouTube</button>
      </div>
      <div class="clips" id="clips"></div>
    </div>`;

  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => poll(id), 1500);
  poll(id);
}

async function poll(id) {
  const r = await fetch(`/api/jobs/${id}`); if (!r.ok) return;
  const j = await r.json();

  $('#barInner').style.width = (j.progress * 100).toFixed(0) + '%';
  $('#statusText').textContent = j.message || j.status;

  if (j.clips && j.clips.length) {
    $('#clipsCard').hidden = false;
    $('#clips').innerHTML = j.clips.map(renderClip).join('');

    // Show "Upload all" once there's at least one ready clip that isn't already uploaded
    const readyToUpload = j.clips.some(c => c.status === 'done' && c.file && c.youtube_status !== 'uploaded');
    const anyUploading = j.clips.some(c => c.youtube_status === 'uploading');
    const btn = $('#uploadAll');
    if (btn) {
      btn.style.display = readyToUpload ? 'inline-block' : 'none';
      btn.disabled = anyUploading;
      btn.textContent = anyUploading ? 'Uploading…' : '↑ Upload all to YouTube';
      btn.onclick = () => uploadAll(j.id);
    }
  }

  if (j.status === 'done' || j.status === 'failed') {
    // Keep polling for a bit if uploads are still happening so the UI stays live.
    const anyUploading = (j.clips || []).some(c => c.youtube_status === 'uploading');
    if (!anyUploading) {
      clearInterval(pollTimer); pollTimer = null;
    }
    if (j.status === 'failed') {
      $('#warn').textContent = j.error || 'Failed';
    }
  }
}

async function uploadAll(jobId) {
  const btn = $('#uploadAll');
  btn.disabled = true;
  btn.textContent = 'Queuing…';
  try {
    const r = await fetch(`/api/jobs/${jobId}/upload-all`, { method: 'POST' });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    // Resume polling so per-clip status updates as each upload finishes.
    if (!pollTimer) {
      pollTimer = setInterval(() => poll(jobId), 1500);
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '↑ Upload all to YouTube';
    alert(`Bulk upload failed to start: ${e.message}`);
  }
}

function renderClip(c) {
  const ready = c.status === 'done' && c.file;
  return `
    <div class="clip">
      ${ready
        ? `<video src="/api/clips/${c.id}/preview" controls preload="metadata"></video>`
        : `<div class="pending" style="aspect-ratio:9/16; display:flex; align-items:center; justify-content:center;">${c.status === 'failed' ? '⚠️ failed' : 'rendering…'}</div>`}
      <div class="meta">
        <div class="title">${escapeHtml(c.title)}</div>
        <div class="hook">${escapeHtml(c.hook || '')}</div>
        <div class="row">
          <div class="score">★ ${c.score}</div>
          <div class="duration">${fmtDur(c.duration)}</div>
        </div>
      </div>
      ${ready ? `
        <div class="actions">
          <a href="/api/clips/${c.id}" download>Download</a>
          ${renderUploadBtn(c)}
        </div>` : ''}
    </div>`;
}

function renderUploadBtn(c) {
  const st = c.youtube_status || 'skipped';
  if (st === 'uploaded' && c.youtube_id) {
    return `<a class="uploaded" href="https://studio.youtube.com/video/${c.youtube_id}/edit" target="_blank">✓ On YouTube</a>`;
  }
  if (st === 'uploading') {
    return `<button disabled>Uploading…</button>`;
  }
  const label = st === 'failed' ? '⚠ Retry upload' : '↑ Upload';
  const cls = st === 'failed' ? 'failed' : '';
  return `<button class="${cls}" onclick="uploadClip('${c.id}', this)">${label}</button>`;
}

async function uploadClip(clipId, btn) {
  btn.disabled = true;
  const prevLabel = btn.textContent;
  btn.textContent = 'Uploading…';
  btn.className = '';
  try {
    const r = await fetch(`/api/clips/${clipId}/upload`, { method: 'POST' });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.detail || r.statusText);
    }
    // Job polling has stopped (status=done), so re-fetch once to redraw the card.
    const jobId = clipId.rsplit ? null : clipId.split('-').slice(0, -1).join('-');
    if (jobId) {
      const jr = await fetch(`/api/jobs/${jobId}`);
      if (jr.ok) {
        const job = await jr.json();
        $('#clips').innerHTML = job.clips.map(renderClip).join('');
      }
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = prevLabel;
    btn.className = 'failed';
    alert(`Upload failed: ${e.message}`);
  }
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
</body>
</html>
